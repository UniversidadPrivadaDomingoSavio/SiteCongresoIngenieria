<!DOCTYPE html>
<html lang="es" class="h-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>II Congreso de Ingeniería 2026 - Ponencias</title>

  <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="img/logo_32x32.png">

  <style>
    :root{
      --accent:#1a5f3d;
      --accent-2:#2d8a5f;
      --accent-soft:#e8f4f0;
      --text-main:#0f2438;
      --text-muted:#5f6b7a;
      --card-radius: 22px;
      --shadow-soft: 0 16px 40px rgba(15, 36, 56, 0.10);
      --shadow-featured: 0 20px 45px rgba(26, 95, 61, 0.16);
    }

    .section-intro{
      margin-bottom: 1.5rem;
    }

    .section-title{
      font-size: clamp(1.8rem, 2.8vw, 2.6rem);
      font-weight:800;
      color: var(--text-main);
      margin-bottom:.5rem;
    }

    .special-speakers-block{
      margin-bottom: 4rem;
      position: relative;
    }

    .special-speakers-frame{
      background: linear-gradient(180deg, #ffffff 0%, #f9fbfe 100%);
      border: 1px solid rgba(26, 95, 61, 0.08);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
    }

    .workshop-card{
      border-radius: var(--card-radius);
      overflow: hidden;
      background: #fff;
      transition: transform .28s ease, box-shadow .28s ease;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
      height: 100%;
    }

    .workshop-card:hover{
      transform: translateY(-6px);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.12);
    }

    .workshop-img{
      width: 100%;
      height: 290px;
      object-fit: cover;
      display: block;
      background: #edf2f7;
    }

    .workshop-card .card-body{
      padding-top: 1.5rem !important;
    }

    .workshop-card .card-title{
      color: var(--text-main);
      line-height:1.35;
      min-height: 70px;
      font-size: 1rem;
      font-weight: 700;
    }

    .workshop-card .card-text{
      color: var(--text-muted);
      font-size: .95rem;
    }

    .workshop-card .btn{
      border-width: 1.5px;
      font-weight: 600;
      transition: all .25s ease;
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }

    .workshop-card .btn:hover{
      transform: translateY(-1px);
      background: var(--accent);
      color: #fff;
    }

    .workshop-card--featured{
      position: relative;
      border: 2px solid var(--accent);
      box-shadow: var(--shadow-featured);
      background: linear-gradient(180deg, #ffffff 0%, #f0faf8 100%);
    }

    .workshop-card--featured::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius: var(--card-radius);
      padding:1px;
      background: linear-gradient(135deg, rgba(45,138,95,.35), rgba(26,95,61,.08));
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events:none;
    }

    .featured-ribbon{
      position:absolute;
      top:16px;
      left:16px;
      z-index:4;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#fff;
      padding:.5rem .95rem;
      border-radius:999px;
      font-size:.72rem;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      box-shadow: 0 10px 22px rgba(26, 95, 61, .28);
    }

    .workshop-card--featured .card-title{
      color: var(--accent);
      font-size: 1.08rem;
      min-height: 62px;
      font-weight: 700;
    }

    .workshop-card--featured .card-text{
      color:#334155;
      font-size: 1rem;
      font-weight: 500;
    }

    .workshop-card--featured .btn{
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }

    .workshop-card--featured .btn:hover{
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .regular-section-title{
      margin-top: .5rem;
      margin-bottom: 1.8rem;
    }

    .regular-section-title h3{
      font-size: clamp(1.4rem, 2vw, 2rem);
      font-weight: 800;
      color: var(--text-main);
      margin-bottom:.35rem;
    }

    .hero-strip {
      display: flex;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      overflow: hidden;
      min-height: 190px;
      height: 300px;
      background: linear-gradient(135deg, #1a5f3d, #2d8a5f);
      position: relative;
      z-index: 2;
    }

    .hero-strip__media { 
      flex: 0 0 58%; 
      min-height: 190px; 
    }

    .hero-strip__media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-strip__panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2.2rem 2.4rem;
      background: linear-gradient(
        90deg,
        rgba(26, 95, 61, 0.95) 0%,
        rgba(45, 138, 95, 0.95) 100%
      );
    }

    .hero-strip__title {
      margin: 0;
      color: #fff;
      font-weight: 800;
      font-size: clamp(1.4rem, 2.8vw, 2.8rem);
    }

    /* TABS */
    .date-tabs {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .date-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.9rem 2rem;
      border-radius: 14px;
      border: 2px solid rgba(26, 95, 61, 0.2);
      background: #fff;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      color: #374151;
      min-width: 130px;
    }

    .date-tab:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(26, 95, 61, 0.12);
    }

    .date-tab.active {
      background: linear-gradient(135deg, #1a5f3d, #2d8a5f);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 6px 24px rgba(26, 95, 61, 0.3);
      transform: translateY(-3px);
    }

    .date-tab__day {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .date-tab__month {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-top: 0.2rem;
      text-align: center;
    }

    /* MODAL */
    .speaker-modal__img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 18px;
      background: #edf2f7;
    }

    .speaker-modal__name {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: .35rem;
    }

    .speaker-modal__title {
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: .8rem;
    }

    .speaker-modal__meta {
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .speaker-schedule-card {
      border: 1px solid rgba(26, 95, 61, .08);
      border-radius: 16px;
      padding: 1rem;
      background: #f8fbff;
      margin-bottom: .9rem;
    }

    .speaker-schedule-card:last-child {
      margin-bottom: 0;
    }

    .speaker-schedule-card__day {
      display: inline-block;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--accent);
      background: #e8f4f0;
      border-radius: 999px;
      padding: .35rem .7rem;
      margin-bottom: .65rem;
    }

    .speaker-schedule-card__time {
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: .3rem;
    }

    .speaker-schedule-card__topic {
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 0;
    }

    .hidden-by-filter {
      display: none !important;
    }

    .speaker-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 991.98px){
      .special-speakers-frame{
        padding: 1.25rem;
      }

      .workshop-img{
        height: 280px;
      }

      .hero-strip {
        flex-direction: column;
        min-height: 0;
      }

      .hero-strip__media {
        flex-basis: auto;
        height: 210px;
      }

      .hero-strip__panel {
        padding: 1.4rem;
      }

      .date-tab {
        min-width: 110px;
        padding: 0.8rem 1.4rem;
      }
    }

    .modal-close-x{
      border: 0;
      background: transparent;
      color: var(--text-main);
      font-size: 2rem;
      line-height: 1;
      font-weight: 400;
      cursor: pointer;
      padding: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background .2s ease, transform .2s ease, opacity .2s ease;
    }

    .modal-close-x:hover{
      background: rgba(26, 95, 61, 0.08);
      transform: scale(1.05);
    }

    .modal-close-x:focus{
      outline: none;
      box-shadow: 0 0 0 0.2rem rgba(26, 95, 61, 0.18);
    }

    @media (max-width: 575.98px){
      .workshop-img{
        height: 260px;
      }

      .workshop-card .card-body{
        padding-top: 1.5rem !important;
      }
    }
  </style>
</head>

<body class="d-flex flex-column h-100">
  <div class="page-wrap d-flex flex-column min-vh-100">

    <div class="bg-right d-none d-lg-block"></div>
    <div id="header-placeholder"></div>

    <main class="flex-shrink-0 content-padding page-content">

      <section class="hero-strip my-4">
        <div class="hero-strip__media">
          <video autoplay muted loop playsinline>
            <source src="img/ciudad.mp4" type="video/mp4">
          </video>
        </div>
        <div class="hero-strip__panel">
          <h2 class="hero-strip__title">Ponencias</h2>
        </div>
      </section>

      <div class="container my-5">

        <!-- FILTROS POR SESIÓN -->
        <div class="date-tabs ponencias-tabs mb-5">
          <button class="date-tab date-tab--all active" onclick="filterPonencias('all', this)">
            <span class="date-tab__day">Todas</span>
            <span class="date-tab__month">Sesiones</span>
          </button>

          <button class="date-tab" onclick="filterPonencias('manana', this)">
            <span class="date-tab__day">Mañana</span>
            <span class="date-tab__month">09:10 - 12:25</span>
          </button>

          <button class="date-tab" onclick="filterPonencias('noche', this)">
            <span class="date-tab__day">Noche</span>
            <span class="date-tab__month">19:10 - 21:20</span>
          </button>
        </div>

        <!-- INVITADOS ESPECIALES -->
        <section class="special-speakers-block" id="special-speakers-section">
          <div class="section-intro">
            <h4 class="section-title">Ponencias Destacadas</h4>
          </div>

          <div class="special-speakers-frame">
            <div class="row g-4" id="featured-speakers-grid"></div>
          </div>
        </section>

        <!-- RESTO DE PONENCIAS -->
        <section id="regular-speakers-section">
          <div class="regular-section-title">
            <h3>Todas las Ponencias</h3>
          </div>

          <div class="row g-4" id="regular-speakers-grid"></div>
        </section>

      </div>
    </main>

    <div id="footer-placeholder" class="mt-auto"></div>
  </div>

  <!-- MODAL LEER MÁS -->
  <div class="modal fade" id="speakerModal" tabindex="-1" aria-labelledby="speakerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0" style="border-radius: 24px; overflow: hidden;">
        
        <div class="modal-header border-0 pb-0 px-4 pt-4 d-flex justify-content-between align-items-start">
          <h5 class="modal-title fw-bold" id="speakerModalLabel">Detalle del Ponente</h5>
          <button type="button" class="modal-close-x" data-bs-dismiss="modal" aria-label="Cerrar">×</button>
        </div>

        <div class="modal-body px-4 pb-4">
          <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-5">
              <img id="modalSpeakerImage" class="speaker-modal__img" src="img/logo_32x32.png" alt="Ponente">
            </div>

            <div class="col-12 col-lg-7">
              <div class="speaker-modal__name" id="modalSpeakerName">Nombre del Ponente</div>
              <div class="speaker-modal__title" id="modalSpeakerTitle">Título de la ponencia</div>
              <div class="speaker-modal__meta" id="modalSpeakerMeta">Información general</div>

              <div id="modalSpeakerSchedule"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="js/layout.js"></script>

  <script>

    const speakers = [

        academicTitle: 'Magíster en Administración de Negocios',

        profile: 'Especialista en logística y comercio internacional con 15 años de experiencia en operaciones en mercados como China y Estados Unidos, optimizando procesos desde la producción hasta la distribución final.',
        schedules: [
          { sessionLabel: 'Sesión de la Mañana', time: '10:30 - 11:05', title: 'Emprendimientos y medios de pago en Blockchain' }
        ]

      {

        academicTitle: 'Ingeniero Petrolero',

        profile: 'Ingeniero Petrolero y Mecánico Industrial, con amplia experiencia en mantenimiento industrial y gestión pública. Emprendedor y capacitador profesional en inversiones internacional y compras con Criptomonedas.',

      },

        featured: false,

        profile: 'Especialista en ciencia de datos con formación en Italia, experto en big data, machine learning, visualización de datos y analítica avanzada para el ámbito empresarial y tecnológico.',
        schedules: [
          { sessionLabel: 'Sesión de la Noche', time: '19:55 - 20:35', title: 'Desarrollando soluciones de IA para Europa desde Bolivia: Retos y aprendizajes' }
        ]
      },
      {
        name: 'Ing. Kevin Ronald López Orellana',
        featured: false,
        session: 'noche',
        image: 'img/ponencias/kevin_lopez.jpg',
        academicTitle: 'Ingeniero en Sistemas',
        mainTitle: 'Blockchain y Criptomonedas, emprendimientos de alto impacto',
        profile: 'Fundador y líder de startups en Latinoamérica, con más de 8 años de experiencia en desarrollo de software. Enfocado en innovación, emprendimiento tecnológico y soluciones digitales con impacto empresarial.',
        schedules: [
          { sessionLabel: 'Sesión de la Noche', time: '20:40 - 21:20', title: 'Blockchain y Criptomonedas, emprendimientos de alto impacto' }
        ]
      }
    ];

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getSchedulesForFilter(speaker) {
      return speaker.schedules;
    }

    function speakerMatchesFilter(speaker) {
      if (currentFilter === 'all') return true;
      return speaker.session === currentFilter;
    }

    function getCardTitle(speaker) {
      return speaker.mainTitle || 'Tema por confirmar';
    }

    function getCardSubtitle(speaker) {
      return speaker.name;
    }

    function createFeaturedCard(speaker, index) {
      return `
        <div class="col-12 col-md-6 col-lg-4 speaker-item">
          <div class="card workshop-card workshop-card--featured h-100 border-0">
            <div class="position-relative">
              <span class="featured-ribbon">Ponencia Destacada</span>
              <img src="${escapeHtml(speaker.image || fallbackImg)}" class="card-img-top workshop-img" alt="${escapeHtml(speaker.name)}" onerror="this.src='${fallbackImg}'">
            </div>
            <div class="card-body p-4 d-flex flex-column">
              <div class="speaker-subtitle">${escapeHtml(speaker.academicTitle)}</div>
              <h5 class="card-title fw-bold">${escapeHtml(getCardTitle(speaker))}</h5>
              <p class="card-text flex-grow-1 mb-0">${escapeHtml(getCardSubtitle(speaker))}</p>
              <div class="d-flex justify-content-end mt-3">
                <button type="button" class="btn btn-sm rounded-pill px-4" onclick="openSpeakerModal(${index})">Leer más</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function createRegularCard(speaker, index) {
      return `
        <div class="col-12 col-md-6 col-lg-3 speaker-item">
          <div class="card workshop-card h-100 border-0 shadow-sm">
            <div class="position-relative">
              <img src="${escapeHtml(speaker.image || fallbackImg)}" class="card-img-top workshop-img" alt="${escapeHtml(speaker.name)}" onerror="this.src='${fallbackImg}'">
            </div>
            <div class="card-body p-4 d-flex flex-column">
              <div class="speaker-subtitle">${escapeHtml(speaker.academicTitle)}</div>
              <h5 class="card-title fw-bold">${escapeHtml(getCardTitle(speaker))}</h5>
              <p class="card-text small flex-grow-1 mb-0">${escapeHtml(getCardSubtitle(speaker))}</p>
              <div class="d-flex justify-content-end mt-3">
                <button type="button" class="btn btn-sm rounded-pill px-4" onclick="openSpeakerModal(${index})">Leer más</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderSpeakers() {
      const featuredGrid = document.getElementById('featured-speakers-grid');
      const regularGrid = document.getElementById('regular-speakers-grid');

      const visibleFeatured = speakers.filter(s => s.featured && speakerMatchesFilter(s));
      const visibleRegular = speakers.filter(s => !s.featured && speakerMatchesFilter(s));

      featuredGrid.innerHTML = visibleFeatured.map((speaker, index) => {
        const realIndex = speakers.findIndex(item => item.name === speaker.name);
        return createFeaturedCard(speaker, realIndex);
      }).join('');

      regularGrid.innerHTML = visibleRegular.map((speaker) => {
        const realIndex = speakers.findIndex(item => item.name === speaker.name);
        return createRegularCard(speaker, realIndex);
      }).join('');

      document.getElementById('special-speakers-section').style.display = visibleFeatured.length ? '' : 'none';
    }

    function filterPonencias(session, btn) {
      currentFilter = session;

      document.querySelectorAll('.ponencias-tabs .date-tab').forEach(tab => {
        tab.classList.remove('active');
      });

      btn.classList.add('active');
      renderSpeakers();
    }

    function buildScheduleHtml(speaker) {
      const schedules = getSchedulesForFilter(speaker);

      return schedules.map(item => `
        <div class="speaker-schedule-card">
          <div class="speaker-schedule-card__day">${escapeHtml(item.sessionLabel)}</div>
          <div class="speaker-schedule-card__time">Horario: ${escapeHtml(item.time)}</div>
          <p class="speaker-schedule-card__topic"><strong>Tema:</strong> ${escapeHtml(item.title)}</p>
        </div>
      `).join('');
    }

    function openSpeakerModal(index) {
      const speaker = speakers[index];
      if (!speaker) return;

      document.getElementById('modalSpeakerImage').src = speaker.image || fallbackImg;
      document.getElementById('modalSpeakerImage').onerror = function () {
        this.src = fallbackImg;
      };

      document.getElementById('modalSpeakerName').textContent = speaker.name;
      document.getElementById('modalSpeakerTitle').textContent = speaker.mainTitle;
      document.getElementById('modalSpeakerMeta').innerHTML = `
        <strong>Formación:</strong> ${escapeHtml(speaker.academicTitle)}<br>
        <strong>Perfil:</strong> ${escapeHtml(speaker.profile)}
      `;
      document.getElementById('modalSpeakerSchedule').innerHTML = buildScheduleHtml(speaker);

      speakerModal.show();
    }

    document.addEventListener('DOMContentLoaded', function () {
      speakerModal = new bootstrap.Modal(document.getElementById('speakerModal'));
      renderSpeakers();
    });
  </script>
</body>
</html>
