<!DOCTYPE html>
<html lang="es" class="h-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congreso de Inteligencia Artificial y Tecnologías Digitales para la Innovación</title>

  <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="img/logo_32x32.png">
</head>

<body class="page-ponencias d-flex flex-column h-100">
  <div class="page-wrap d-flex flex-column min-vh-100">

    <div class="bg-right d-none d-lg-block"></div>
    <div id="header-placeholder"></div>

    <main class="flex-shrink-0 content-padding page-content">

      <section class="hero-strip my-4">
        <div class="hero-strip__media">
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/Technology Background.mp4" type="video/mp4">
          </video>
        </div>
        <div class="hero-strip__panel">
          <h2 class="hero-strip__title">Ponencias</h2>
        </div>
      </section>

      <div class="container my-5">

        <!-- FILTROS POR SESIÓN -->
        <div class="date-tabs ponencias-tabs mb-5">
          <button type="button" class="date-tab date-tab--all active" onclick="filterPonencias('all', this)">
            <span class="date-tab__day">Todas</span>
          </button>

          <button type="button" class="date-tab" onclick="filterPonencias('manana', this)">
            <span class="date-tab__day">Mañana</span>
          </button>

          <button type="button" class="date-tab" onclick="filterPonencias('noche', this)">
            <span class="date-tab__day">Noche</span>
          </button>
        </div>

        <!-- TODAS LAS PONENCIAS -->
        <section id="regular-speakers-section">
          <div class="regular-section-title">
            <h3>Ponencias</h3>
          </div>

          <div class="row g-4" id="regular-speakers-grid"></div>
        </section>

      </div>
    </main>

    <div id="footer-placeholder" class="mt-auto"></div>
  </div>

  <!-- MODAL LEER MÁS -->
  <div class="modal fade" id="speakerModal" tabindex="-1" aria-labelledby="speakerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content speaker-modal-content border-0">
        
        <div class="modal-header border-0 pb-0 px-4 pt-4 d-flex justify-content-between align-items-start">
          <h5 class="modal-title fw-bold" id="speakerModalLabel">Detalle del Ponente</h5>
          <button type="button" class="modal-close-x" data-bs-dismiss="modal" aria-label="Cerrar">×</button>
        </div>

        <div class="modal-body px-4 pb-4">
          <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-5">
              <img id="modalSpeakerImage" class="speaker-modal__img" src="img/logo_32x32.png" alt="Ponente">
            </div>

            <div class="col-12 col-lg-7">
              <div class="speaker-modal__name" id="modalSpeakerName">Nombre del Ponente</div>
              <div class="speaker-modal__title" id="modalSpeakerTitle">Título de la ponencia</div>
              <div class="speaker-modal__meta" id="modalSpeakerMeta">Información general</div>

              <div id="modalSpeakerSchedule"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="js/layout.js"></script>

  <script>

    let currentFilter = 'all';
    let speakerModal = null;

    const speakers = [

        schedules: [
          {
            sessionLabel: 'Sesión de la Mañana',
            time: '09:10 - 09:45',
            title: 'Del modelo general al sistema experto: Agentes inteligentes para resolver problemas reales en ingeniería'
          }
        ]
      },
      {
        name: 'PhD(c). Ernesto Soto Roca',

        image: 'img/ponencias/ernesto_soto.jpg',
        academicTitle: 'Doctorante en Ciencias de la Computación',

        profile: 'Magíster en Ingeniería de Software. Cuenta con certificación internacional SCRUM Master y formación en gestión de proyectos. Actualmente ocupa el cargo de Director de Investigación y Calidad Académica en UPDS Santa Cruz.',
        schedules: [
          {

            time: '09:50 - 10:25',
            title: 'Scrum evolucionando con la IA'
          }
        ]
      },
      {

        image: 'img/ponencias/alejandro_pereyra.jpg',
        academicTitle: 'Magíster en Administración de Negocios',
        mainTitle: 'Emprendimientos y medios de pago en Blockchain',
        profile: 'Especialista en logística y comercio internacional con 15 años de experiencia en operaciones en mercados como China y Estados Unidos, optimizando procesos desde la producción hasta la distribución final.',
        schedules: [
          {
            sessionLabel: 'Sesión de la Mañana',
            time: '10:30 - 11:05',
            title: 'Emprendimientos y medios de pago en Blockchain'
          }
        ]
      },
      {
        name: 'PhD(c). Leonardo Vargas Peña',
        session: 'manana',

        academicTitle: 'Doctorante en Ciencias Exactas y tecnología',
        mainTitle: 'Modelo pedagógico adaptativo basado en IA, para el aprendizaje de programación',
        profile: 'Director de la carrera de Ingeniería en Sistemas (UAGRM) y experto en Seguridad Informática con 20 años de experiencia. Investigador en IA aplicada a la educación y docente con formación de postgrado en España.',
        schedules: [
          {

          }
        ]
      },
      {
        name: 'Ing. John Christian Salas Cabrera',
        session: 'manana',
        image: 'img/ponencias/john_salas.jpg',
        academicTitle: 'Ingeniero Petrolero',
        mainTitle: 'Trading e inversiones en los mercados financieros',
        profile: 'Ingeniero Petrolero y Mecánico Industrial, con amplia experiencia en mantenimiento industrial y gestión pública. Emprendedor y capacitador profesional en inversiones internacional y compras con Criptomonedas.',
        schedules: [
          {
            sessionLabel: 'Sesión de la Mañana',

            title: 'Trading e inversiones en los mercados financieros'
          }
        ]
      },
      {
        name: 'MSc. Jimmy Nataniel Requena Llorentty',
        session: 'noche',
        image: 'img/ponencias/jimmy_requena.jpg',
        academicTitle: 'MSc. en Ingeniería Matemática e Informática',
        mainTitle: 'Operadores que nunca duermen: Agentes Inteligentes para Fallbacks',
        profile: 'Consultor y Scrum Master con más de 10 años de experiencia en implementación de sistemas ERP (SAP, Oracle), enfocado en transformación digital, gestión ágil, Big data y optimización de procesos empresariales con tecnología.',
        schedules: [
          {
            sessionLabel: 'Sesión de la Noche',

            title: 'Operadores que nunca duermen: Agentes Inteligentes para Fallbacks'
          }
        ]
      },
      {
        name: 'PhD(c). Edgar Jaldin Torrico',
        session: 'noche',
        image: 'img/ponencias/edgar_jaldin.jpg',
        academicTitle: 'Doctorante en Ciencias de la Computación',
        mainTitle: 'Desarrollando soluciones de IA para Europa desde Bolivia: Retos y aprendizajes',
        profile: 'Especialista en ciencia de datos con formación en Italia, experto en big data, machine learning, visualización de datos y analítica avanzada para el ámbito empresarial y tecnológico.',
        schedules: [
          {
            sessionLabel: 'Sesión de la Noche',
            time: '19:55 - 20:35',
            title: 'Desarrollando soluciones de IA para Europa desde Bolivia: Retos y aprendizajes'
          }
        ]
      },
      {
        name: 'Ing. Kevin Ronald López Orellana',
        session: 'noche',
        image: 'img/ponencias/kevin_lopez.jpg',
        academicTitle: 'Ingeniero en Sistemas',
        mainTitle: 'Blockchain y Criptomonedas, emprendimientos de alto impacto',
        profile: 'Fundador y líder de startups en Latinoamérica, con más de 8 años de experiencia en desarrollo de software. Enfocado en innovación, emprendimiento tecnológico y soluciones digitales con impacto empresarial.',
        schedules: [
          {
            sessionLabel: 'Sesión de la Noche',
            time: '20:40 - 21:20',
            title: 'Blockchain y Criptomonedas, emprendimientos de alto impacto'
          }
        ]
      }
    ];

    function escapeHtml(text) {
      if (!text) return '';

      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getSchedulesForFilter(speaker) {
      return speaker.schedules;
    }

    function speakerMatchesFilter(speaker) {
      if (currentFilter === 'all') return true;

      return speaker.session === currentFilter;
    }

    function getCardTitle(speaker) {
      return speaker.mainTitle || 'Tema por confirmar';
    }

    function getCardSubtitle(speaker) {
      return speaker.name;
    }

    function createRegularCard(speaker, index) {
      return `
        <div class="col-12 col-md-6 col-lg-4 speaker-item">
          <div class="card workshop-card h-100 border-0 shadow-sm">
            <div class="position-relative">
              <img 
                src="${escapeHtml(speaker.image || fallbackImg)}" 
                class="card-img-top workshop-img" 
                alt="${escapeHtml(speaker.name)}" 
                onerror="this.onerror=null; this.src='${fallbackImg}'"
              >
            </div>

            <div class="card-body p-4 d-flex flex-column">
              <div class="speaker-subtitle">${escapeHtml(speaker.academicTitle)}</div>
              <h5 class="card-title fw-bold">${escapeHtml(getCardTitle(speaker))}</h5>
              <p class="card-text small flex-grow-1 mb-0">${escapeHtml(getCardSubtitle(speaker))}</p>

              <div class="d-flex justify-content-end mt-3">
                <button type="button" class="btn btn-sm rounded-pill px-4" onclick="openSpeakerModal(${index})">
                  Leer más
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderSpeakers() {
      const regularGrid = document.getElementById('regular-speakers-grid');

      const visibleSpeakers = speakers.filter(speakerMatchesFilter);

      regularGrid.innerHTML = visibleSpeakers.map((speaker) => {
        const realIndex = speakers.findIndex(item => item.name === speaker.name);
        return createRegularCard(speaker, realIndex);
      }).join('');
    }

    function filterPonencias(session, btn) {
      currentFilter = session;

      document.querySelectorAll('.ponencias-tabs .date-tab').forEach(tab => {
        tab.classList.remove('active');
      });

      btn.classList.add('active');
      renderSpeakers();
    }

    function buildScheduleHtml(speaker) {
      const schedules = getSchedulesForFilter(speaker);

      return schedules.map(item => `
        <div class="speaker-schedule-card">
          <div class="speaker-schedule-card__day">${escapeHtml(item.sessionLabel)}</div>
          <div class="speaker-schedule-card__time">Horario: ${escapeHtml(item.time)}</div>
          <p class="speaker-schedule-card__topic">
            <strong>Tema:</strong> ${escapeHtml(item.title)}
          </p>
        </div>
      `).join('');
    }

    function openSpeakerModal(index) {
      const speaker = speakers[index];
      if (!speaker || !speakerModal) return;

      const modalImage = document.getElementById('modalSpeakerImage');

      modalImage.onerror = function () {
        this.onerror = null;
        this.src = fallbackImg;
      };

      modalImage.src = speaker.image || fallbackImg;

      document.getElementById('modalSpeakerName').textContent = speaker.name;
      document.getElementById('modalSpeakerTitle').textContent = speaker.mainTitle;

      document.getElementById('modalSpeakerMeta').innerHTML = `
        <strong>Formación:</strong> ${escapeHtml(speaker.academicTitle)}<br>
        <strong>Perfil:</strong> ${escapeHtml(speaker.profile)}
      `;

      document.getElementById('modalSpeakerSchedule').innerHTML = buildScheduleHtml(speaker);

      speakerModal.show();
    }

    document.addEventListener('DOMContentLoaded', function () {
      speakerModal = new bootstrap.Modal(document.getElementById('speakerModal'));
      renderSpeakers();
    });
  </script>
</body>
</html>
